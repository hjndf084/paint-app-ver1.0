<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塗料配合計算</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">
<link rel="apple-touch-icon" href="icon.png">

<style>
body { font-family: sans-serif; padding: 15px; background:#f7f7f7; }
h2 { margin-bottom:10px; }
label { font-weight:bold; }
input {
  width: 100%;
  padding: 12px;
  margin: 5px 0 12px 0;
  font-size: 18px;
}
button {
  width: 100%;
  padding: 15px;
  font-size: 20px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:6px;
}
.result {
  margin-top:20px;
  background:white;
  padding:15px;
  border-radius:6px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>塗料配合計算（現場版）</h2>

<label>① 1個あたり使用量 (g)</label>
<input type="number" id="perUnit">

<label>② 配合比（主剤 / 硬化剤 / シンナー）</label>
<input type="number" id="main" placeholder="主剤">
<input type="number" id="hard" placeholder="硬化剤">
<input type="number" id="thinner" placeholder="シンナー">

<label>③ 生産数</label>
<input type="number" id="qty">

<label>④ タンク最低量（g）※デフォルト500</label>
<input type="number" id="tank" value="500">

<button onclick="calc()">計算する</button>

<div class="result" id="result"></div>

<script>
function calc() {

  let perUnit = Number(document.getElementById("perUnit").value);
  let m = Number(document.getElementById("main").value);
  let h = Number(document.getElementById("hard").value);
  let t = Number(document.getElementById("thinner").value);
  let qty = Number(document.getElementById("qty").value);
  let tank = Number(document.getElementById("tank").value);

  let sumRatio = m + h + t;

  if(perUnit === 0 || sumRatio === 0 || qty === 0){
    document.getElementById("result").innerHTML = "入力不足です";
    return;
  }

  let useTotal = perUnit * qty;
  let total = useTotal + tank;

  let mainG = total / sumRatio * m;
  let hardG = total / sumRatio * h;
  let thinnerG = total / sumRatio * t;

  document.getElementById("result").innerHTML =
    "■実使用量: " + useTotal.toFixed(1) + " g<br>" +
    "■タンク込み合計: " + total.toFixed(1) + " g<br><br>" +
    "主剤: " + mainG.toFixed(1) + " g<br>" +
    "硬化剤: " + hardG.toFixed(1) + " g<br>" +
    "シンナー: " + thinnerG.toFixed(1) + " g";
}
</script>

</body>
</html>
